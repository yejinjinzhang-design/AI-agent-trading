task:
  name: "DNA Enhancer Design"
  description: |
    Design 200-base-pair DNA enhancer sequences that are highly active in HepG2
    (liver) cells while minimizing activity in off-target cell types (K562
    leukemia and SKNSH neuroblastoma).

    This is a cell-type-specific enhancer design problem from the SAGA
    framework's DNA design task. The goal is to generate sequences that drive
    strong gene expression specifically in the target tissue.

    **Your program** (`solution.py`) must define a `run()` function that returns
    a list of DNA sequences (strings of A, T, G, C characters), each exactly
    200 bases long. Return at least 50 and up to 200 sequences.

    **Scoring (tiered):**
    - Always available: GC content stability bonus + population diversity
    - With Enformer model: HepG2 expression (maximize), K562/SKNSH (minimize)

    **Optimization approaches to consider:**
    - Evolutionary algorithms with point mutations, insertions, deletions
    - Motif-aware design (known transcription factor binding sites)
    - GC content and sequence stability optimization
    - Population diversity maintenance to avoid premature convergence
    - LLM-guided sequence mutation

  tips: |
    - Sequences must be exactly 200 characters, containing only A, T, G, C
    - GC content near 0.45-0.55 improves sequence stability
    - Invalid sequences (wrong length, invalid characters) are filtered out
    - With Enformer model: composite = HepG2 - 0.3*(K562+SKNSH) + diversity + gc
    - Without model: composite = gc_bonus + diversity_bonus
    - The eval timeout is 600s — model loading takes ~30-60s
    - To enable full scoring, install grelu + place Enformer checkpoint in eval/scorers/model_data/

grader:
  timeout: 600
  direction: maximize
  args:
    program_file: "solution.py"
    top_k: 10

agents:
  count: 1
  runtime: claude_code
  model: claude-opus-4-6

workspace:
  results_dir: "./results"
  repo_path: "./examples/dna_design/seed"
  setup:
    - "uv pip install numpy"

run:
  verbose: false
  ui: false
  session: tmux
