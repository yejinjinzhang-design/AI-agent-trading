task:
  name: "First Autocorrelation Inequality"
  description: |
    Minimize the C1 constant in the first autocorrelation inequality.

    Given a non-negative function f on [0, 0.5], the C1 constant is defined as:
      C1 = max(autoconvolution(f)) / (integral(f))^2

    where autoconvolution is computed as np.convolve(f, f, mode="full") * dx,
    dx = 0.5 / n_points, and the integral is sum(f) * dx.

    Your program file `initial_program.py` must define a `run()` function that returns
    (f_values, c1_achieved, loss, n_points) where:
      - f_values: numpy array of shape (n_points,), non-negative function values
      - c1_achieved: float, the C1 ratio achieved
      - loss: float, the optimization loss
      - n_points: int, number of discretization points

    The goal is to minimize C1 (find a tighter upper bound).
    Score = BENCHMARK / C1 where BENCHMARK = 1.5052939684401607.
    A score of 1.0 means matching the benchmark; higher is better.

    Consider:
    - Gradient-based optimization (Adam, L-BFGS)
    - Varying discretization resolution
    - Smart initialization strategies
    - Learning rate schedules with warmup
  tips: |
    - Eval timeout is 600s. If your solution takes longer, it scores as a timeout.
    - The evaluator verifies: f is non-negative, shape matches n_points, recomputes C1 independently.
    - numpy and scipy are always available.
    - Current best known C1 is ~1.5053 (AlphaEvolve result).
    - Score = BENCHMARK / your_C1; 1.0 means matching the best known result.
    - Lower C1 values yield higher scores.

grader:
  timeout: 600
  direction: maximize
  args:
    program_file: "initial_program.py"

agents:
  count: 2
  runtime: claude_code
  model: claude-sonnet-4-6

workspace:
  results_dir: "./results"
  repo_path: "./examples/math/first_autocorr_ineq/seed"
  setup:
    - "uv sync"

run:
  verbose: false
  ui: false
  session: tmux
