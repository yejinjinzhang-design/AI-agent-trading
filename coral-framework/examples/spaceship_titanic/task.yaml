task:
  name: "Spaceship Titanic"
  description: |
    Welcome to the year 2912, where your data science skills are needed to solve a
    cosmic mystery. We've received a transmission from four lightyears away and things
    aren't looking good.

    The Spaceship Titanic was an interstellar passenger liner launched a month ago. With
    almost 13,000 passengers on board, the vessel set out on its maiden voyage transporting
    emigrants from our solar system to three newly habitable exoplanets orbiting nearby
    stars.

    While rounding Alpha Centauri en route to its first destination ‚Äî the torrid 55
    Cancri E ‚Äî the unwary Spaceship Titanic collided with a spacetime anomaly hidden
    within a dust cloud. Sadly, it met a similar fate as its namesake from 1000 years
    before. Though the ship stayed intact, almost half of the passengers were transported
    to an alternate dimension!

    To help rescue crews and retrieve the lost passengers, you are challenged to predict
    which passengers were transported by the anomaly using records recovered from the
    spaceship's damaged computer system.

    Your task is to predict whether a passenger was transported to an alternate dimension
    during the Spaceship Titanic's collision with the spacetime anomaly. To help you make
    these predictions, you're given a set of personal records recovered from the ship's
    damaged computer system.

    **File and Data Field Descriptions:**

    - `train.csv` ‚Äî Personal records for the passengers, to be used as training data.
      - `PassengerId` ‚Äî A unique Id for each passenger. Each Id takes the form `gggg_pp`
        where `gggg` indicates a group the passenger is travelling with and `pp` is their
        number within the group. People in a group are often family members, but not always.
      - `HomePlanet` ‚Äî The planet the passenger departed from, typically their planet of
        permanent residence.
      - `CryoSleep` ‚Äî Indicates whether the passenger elected to be put into suspended
        animation for the duration of the voyage. Passengers in cryosleep are confined to
        their cabins.
      - `Cabin` ‚Äî The cabin number where the passenger is staying. Takes the form
        `deck/num/side`, where `side` can be either `P` for Port or `S` for Starboard.
      - `Destination` ‚Äî The planet the passenger will be debarking to.
      - `Age` ‚Äî The age of the passenger.
      - `VIP` ‚Äî Whether the passenger has paid for special VIP service during the voyage.
      - `RoomService`, `FoodCourt`, `ShoppingMall`, `Spa`, `VRDeck` ‚Äî Amount the passenger
        has billed at each of the Spaceship Titanic's many luxury amenities.
      - `Name` ‚Äî The first and last names of the passenger.
      - `Transported` ‚Äî Whether the passenger was transported to another dimension. This is
        the target, the column you are trying to predict.
    - `test.csv` ‚Äî Personal records for the test passengers. Your task is to predict the
      value of `Transported` for the passengers in this set.
    - `sample_submission.csv` ‚Äî A submission file in the correct format.
      - `PassengerId` - Id for each passenger in the test set.
      - `Transported` - The target. For each passenger, predict either `True` or `False`.

    **Evaluation:**

    Submissions are evaluated based on classification accuracy, the percentage of predicted
    labels that are correct.

    **Your program** (`solution.py`) must define a `run(train_path, test_path)` function
    that returns a pandas DataFrame with columns `PassengerId` and `Transported` (boolean).

    **Environment:** GPU 0 is a H200 available for use.

  tips: |
    - Metric is classification accuracy (higher is better, 0‚Äì1 scale)
    - Kaggle leaderboard (2288 teams): top score 0.82815, gold ‚â• 0.821, silver ‚â• 0.814, bronze ‚â• 0.810. You are aiming to beat the top score.
    - A naive baseline (predict all False) scores ~0.50
    - Good models score 0.78‚Äì0.80+. Top Kaggle scores exceed 0.82
    - The eval timeout is 120s ‚Äî keep training time reasonable

grader:
  timeout: 120
  direction: maximize
  args:
    program_file: "solution.py"
    train_file: "data/train.csv"
    test_file: "data/test.csv"

agents:
  count: 4
  runtime: claude_code
  model: opus

workspace:
  results_dir: "./results"
  repo_path: "./spaceship_titanic/repo"

run:
  verbose: false
  ui: false
  session: tmux
